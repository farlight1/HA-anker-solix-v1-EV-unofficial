# =======================================================================
# Number Input Controls (Numeric Write Controls)
# =======================================================================
control_items:
  start_charging_btn:
    translation_key: "start_charging_btn"
    address: 21000
    data_type: "UINT16"
    display_type: "button"
    data_type_category: "control"
    write_value: 1
    icon: "mdi:ev-plug-type2"

  stop_charging_btn:
    translation_key: "stop_charging_btn"
    address: 21000
    data_type: "UINT16"
    display_type: "button"      # <--- Llama al nuevo button.py
    data_type_category: "control"
    write_value: 2              # <--- Valor a enviar por Modbus
    icon: "mdi:close-octagon"
    
  boost_mode:
    translation_key: "boost_mode_control"
    address: 21002
    data_type: "UINT16"
    display_type: "button"
    data_type_category: "control"
    write_value: 1
    icon: "mdi:rocket-launch"
      
  maximum_current_setting:
    translation_key: "maximum_current_setting"
    address: 21001
    data_type: "UINT16"
    unit: "A" # El PDF tiene la errata de poner W aquí
    gain: 10
    count: 1
    icon: "mdi:current-ac"
    data_type_category: "control"
    display_type: "input"
    min_value: 6
    max_value: 32
    step: 1

  set_timeout:
    translation_key: "set_timeout"
    address: 21003
    data_type: "UINT16"
    unit: "s" # El PDF tiene la errata de poner A aquí
    gain: 1
    count: 1
    icon: "mdi:timer-outline"
    data_type_category: "control"
    display_type: "input"
    min_value: 5
    max_value: 86400
    step: 1

