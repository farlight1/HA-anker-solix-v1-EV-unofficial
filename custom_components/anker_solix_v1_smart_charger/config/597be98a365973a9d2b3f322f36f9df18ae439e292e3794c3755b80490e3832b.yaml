# =======================================================================
write_quantities:
  enumeration_selection:
     charging_command:
       translation_key: "charging_command"
       address: 21000
       data_type: "UINT16"
       unit: "/"
       gain: 1
       count: 1
       icon: "mdi:play-pause"
       control_type: "select"
       options:
         "1": "start_charging"
         "2": "stop_charging"

