# =============================================================================
# Anker Solix V1 Smart EV Charger Configuration File
# =============================================================================

# Product information
product_info:
  default_name: "Anker SOLIX V1 Smart EV Charger"
  sn_register_key: "device_sn"
  model_register_key: "device_model"
  product_code_mapping:
    "A5191": "Anker SOLIX V1 Smart EV Charger"

# Batch read ranges with register type specification
batch_read_ranges:
  input:
    - 20000-20100  # Lee todo el bloque de sensores de golpe (Modbus soporta hasta 125 regs/petición)
  holding:
    - 21000-21005  # Bloque de registros de control

# =======================================================================
# Read Quantities Configuration (Sensor Type)
# =======================================================================
read_quantities:
  # Intrinsic Information
  product_number:
    translation_key: "product_number"
    address: 20000
    data_type: "UINT16"
    unit: "/"
    gain: 1
    count: 1
    internal: true

  device_model:
    translation_key: "device_model"
    address: 20001
    data_type: "STRING"
    unit: "/"
    gain: 1
    count: 10
    internal: true

  device_sn:
    translation_key: "device_sn"
    address: 20011
    data_type: "STRING"
    unit: "/"
    gain: 1
    count: 12
    internal: true

  device_sw_version:
    translation_key: "device_sw_version"
